{% extends 'base.html' %}

{% block content %}

<style>
body {
    background: linear-gradient(135deg, #73bec8, #e1f5fe, #3c7ba8a2);
    background-size: 400% 400%;
    animation: bgGradient 15s ease infinite;
}

@keyframes bgGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    background: rgba(240, 248, 255, 0.95);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    padding: 2.5rem;
    margin-top: 4rem;
}

h2 {
    font-weight: 700;
    color: #1a237e;
}

.form-group-colored {
    background: #e3f2fd;
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.2rem;
    border: 1px solid #7394af;
}

.form-label {
    font-weight: 600;
    color: #303f9f;
}

.form-control {
    border-radius: 10px;
    border: 1px solid #448690;
    background-color: #73c7ee;
}

.btn-primary {
    background: linear-gradient(90deg, #c1dbf1, #b0c5de);
    border: none;
    border-radius: 12px;
    font-weight: 600;
    padding: 0.6rem;
}

.btn-primary:hover {
    background: linear-gradient(90deg, #88a8cc, #9eb4d5);
}

.fade-in {
    animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="container fade-in" style="max-width:500px;">

<h2 class="text-center mb-4">Reset Password</h2>

<form method="POST">

<div class="form-group-colored">
<label class="form-label">New Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter new password" required>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">Reset Password</button>
</div>

</form>

</div>

{% endblock %}
