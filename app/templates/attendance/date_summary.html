{% extends 'base.html' %}

{% block content %}
<style>
  body {
    background: linear-gradient(135deg, #f8ffae 0%, #43c6ac 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  .container {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(67, 198, 172, 0.2);
    padding: 36px 28px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  h3 {
    font-weight: 700;
    color: #2f856c;
    letter-spacing: 1px;
    font-size: 1.75rem;
    text-shadow: 0 2px 6px rgba(255, 255, 255, 0.5);
    margin-bottom: 28px;
  }

  .list-group-item {
    background: linear-gradient(90deg, #f8ffae, #43c6ac);
    border: none;
    border-radius: 14px;
    margin-bottom: 12px;
    box-shadow: 0 4px 12px rgba(67, 198, 172, 0.08);
    font-size: 1.1rem;
    font-weight: 500;
    color: #1f2937;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .list-group-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(67, 198, 172, 0.15);
  }

  .btn-outline-primary {
    border-color: #2f856c;
    color: #2f856c;
    background: #ffffff;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .btn-outline-primary:hover {
    background: #2f856c;
    color: #fff;
    border-color: #2f856c;
    box-shadow: 0 4px 14px rgba(47, 133, 108, 0.3);
  }

  @media (max-width: 576px) {
    h3 {
      font-size: 1.5rem;
      text-align: center;
    }

    .btn-outline-primary {
      font-size: 0.95rem;
    }

    .list-group-item {
      font-size: 1rem;
      padding: 14px 12px;
    }
  }
</style>

<div class="container mt-4">
  <h3 class="mb-4">🗓️ Attendance by Date</h3>
  <ul class="list-group">
    {% for record in dates %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      {{ record.date.strftime('%d %b %Y') }}
      <a href="{{ url_for('attendance.view_by_date', attendance_date=record.date) }}" class="btn btn-sm btn-outline-primary">
        View Details
      </a>
    </li>
    {% else %}
    <li class="list-group-item text-center">No records found.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
