{% extends 'base.html' %}

{% block content %}
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: linear-gradient(135deg, #73bec8, #e1f5fe, #3c7ba8a2);
    background-size: 400% 400%;
    animation: bgGradient 15s ease infinite;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
    line-height: 1.6;
    height: 100vh;
    justify-content: center;
    align-items: center;
  }

  @keyframes bgGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    width: 100%;
    max-width: 600px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    padding: 3rem;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .container:hover {
    transform: translateY(-5px);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
  }

  h2 {
    font-size: 2rem;
    font-weight: 700;
    color: #0d47a1;
    text-align: center;
    margin-bottom: 2rem;
    letter-spacing: 1px;
  }

  .form-label {
    display: block;
    font-weight: 600;
    color: #1a237e;
    margin-bottom: 0.75rem;
    font-size: 0.95rem;
  }

  input, select, textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    border: 1px solid #cfd8dc;
    margin-bottom: 1.5rem;
    font-size: 1rem;
    transition: border 0.2s ease, box-shadow 0.2s ease;
    background-color: #f9f9f9;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #1e88e5;
    box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.2);
    background-color: #fff;
  }

  button {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 14px;
    background-color: #1e88e5;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
  }

  button:hover {
    background-color: #1565c0;
    transform: scale(1.03);
  }
  .card {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    padding: 2.5rem;
    margin-top: 4rem;
    transition: all 0.3s ease-in-out;
  }

  h4 {
    font-weight: 700;
    color: #1a237e;
    margin-bottom: 1.5rem;
    text-align: center;
  }
</style>
  
<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="card-title mb-4">➕ Add Routine Entry</h4>

      <form method="post">
        <div class="mb-3">
          <label for="day" class="form-label">Day</label>
          <input type="text" name="day" id="day" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="time" class="form-label">Time</label>
          <input type="text" name="time" id="time" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="subject" class="form-label">Subject</label>
          <input type="text" name="subject" id="subject" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="faculty" class="form-label">Faculty</label>
          <input type="text" name="faculty" id="faculty" class="form-control">
        </div>
        <div class="mb-3">
  <label for="room" class="form-label">Room</label>
  <input type="text" name="room" id="room" class="form-control" required>
</div>

        <button type="submit" class="btn btn-success">Save</button> 
        <a href="{{ url_for('routine.view_routine') }}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
