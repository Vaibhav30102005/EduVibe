{% extends 'base.html' %}

{% block content %}
<style>
  body {
    background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .container {
    max-width: 600px;
    margin-top: 50px;
  }

  .card {
    background: #ffffff;
    border-radius: 18px;
    border: none;
    padding: 2rem;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
  }

  .card-title {
    color: #157347;
    font-weight: 700;
    font-size: 1.6rem;
    margin-bottom: 1.5rem;
  }

  .card-body p {
    font-size: 1.05rem;
    color: #333;
    margin-bottom: 1rem;
  }

  .form-label {
    font-weight: 600;
    color: #157347;
    margin-bottom: 0.5rem;
  }

  .form-control {
    border-radius: 10px;
    border: 1px solid #ced4da;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    transition: all 0.3s ease-in-out;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  .form-control:focus {
    border-color: #28a745;
    box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2);
  }

  .btn-success {
    width: 100%;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 10px;
    padding: 12px 0;
    background: linear-gradient(90deg, #198754 0%, #28a745 100%);
    color: white;
    border: none;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }

  .btn-success:hover {
    background: linear-gradient(90deg, #157347 0%, #198754 100%);
    box-shadow: 0 8px 24px rgba(25, 135, 84, 0.3);
  }

  .bi-check-circle-fill {
    margin-right: 8px;
    vertical-align: middle;
  }
  
</style>

<div class="container">
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <h4 class="card-title">Resolve Complaint</h4>

      <p><strong>Title:</strong> {{ complaint.title }}</p>
      <p><strong>Description:</strong> {{ complaint.description }}</p>

      <form method="post">
        <div class="mb-3">
          <label for="response" class="form-label">Response</label>
          <textarea name="response" id="response" class="form-control" rows="5" placeholder="Write your resolution..." required></textarea>
        </div>

        <button type="submit" class="btn btn-success">
          <i class="bi bi-check-circle-fill"></i> Mark as Resolved
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
