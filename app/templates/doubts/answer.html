{% extends "base.html" %}
{% block content %}

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<!-- Answer Doubt Card -->
<div class="card shadow custom-card border-0 mb-4">
  <div class="card-body p-4">
    <h4 class="card-title text-gradient mb-4">📝 Answer Doubt</h4>

    <p><strong class="text-muted">Question:</strong> {{ doubt.question }}</p>

    <form method="post">
      <div class="mb-3">
        <label for="answer" class="form-label">Your Answer</label>
        <textarea name="answer" id="answer" class="form-control custom-textarea" rows="5" placeholder="Write your answer here..." required></textarea>
      </div>
      <button type="submit" class="btn btn-submit">
        <i class="bi bi-send me-2"></i>Submit Answer
      </button>
    </form>
  </div>
</div>

<style>
  body {
    background: linear-gradient(135deg, #aee2ff 0%, #e0f7fa 100%);
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    transition: background 0.4s ease;
    /* Glossy effect */
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(120deg, rgba(255,255,255,0.25) 0%, rgba(174,226,255,0.15) 100%);
    pointer-events: none;
    z-index: 0;
    filter: blur(8px);
  }

  .custom-card {
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 30px rgba(174, 226, 255, 0.18);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    z-index: 1;
  }

  .custom-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 18px 45px rgba(174, 226, 255, 0.25);
  }

  .card-title.text-gradient {
    font-size: 1.75rem;
    font-weight: 700;
    background: linear-gradient(90deg, #38b6ff, #aee2ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.6px;
    text-shadow: 0 2px 6px rgba(56, 182, 255, 0.08);
  }

  .form-label {
    font-weight: 500;
    color: #444;
    margin-bottom: 6px;
  }

  .custom-textarea {
    border-radius: 14px;
    border: 1.5px solid #aee2ff;
    background: #f0fbff;
    font-size: 1.05rem;
    padding: 14px 18px;
    transition: all 0.3s ease;
    box-shadow: inset 0 1px 2px rgba(56, 182, 255, 0.05);
  }

  .custom-textarea:focus {
    border-color: #38b6ff;
    outline: none;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(56, 182, 255, 0.18);
  }

  .btn-submit {
    background: linear-gradient(90deg, #38b6ff 0%, #aee2ff 100%);
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1rem;
    padding: 10px 24px;
    color: #fff;
    box-shadow: 0 6px 20px rgba(56, 182, 255, 0.18);
    transition: all 0.3s ease;
  }

  .btn-submit:hover {
    background: linear-gradient(90deg, #0093e9, #80d0c7);
    box-shadow: 0 12px 28px rgba(56, 182, 255, 0.22);
    transform: translateY(-1px);
  }

  .text-muted {
    color: #6c757d !important;
  }

  @media (max-width: 576px) {
    .custom-card {
      padding: 1rem;
    }
    .btn-submit {
      width: 100%;
    }
  }
</style>

{% endblock %}
