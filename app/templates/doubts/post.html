{% extends 'base.html' %}
{% block content %}

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<!-- Centered Container -->
<div class="d-flex justify-content-center px-3">
  <div class="card shadow custom-doubt-card border-0 mb-4 w-100" style="max-width: 720px;">
    <div class="card-body p-4">
      <h4 class="card-title text-teal mb-4">💬 Post a Doubt</h4>

      <form method="post">
        <div class="mb-3">
          <label for="question" class="form-label">Your Doubt</label>
          <textarea
            name="question"
            id="question"
            class="form-control custom-textarea"
            rows="5"
            placeholder="Describe your doubt clearly..."
            required
          ></textarea>
        </div>

        <button type="submit" class="btn btn-submit">
          <i class="bi bi-send-fill me-2"></i>Submit
        </button>
      </form>
    </div>
  </div>
</div>

<style>
  body {
    background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
  }

  .custom-doubt-card {
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 8px 30px rgba(0, 128, 128, 0.12);
    transition: all 0.3s ease;
  }

  .custom-doubt-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 40px rgba(0, 128, 128, 0.18);
  }

  .card-title.text-teal {
    font-size: 1.75rem;
    font-weight: 700;
    color: #0f766e;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0, 128, 128, 0.1);
  }

  .form-label {
    font-weight: 500;
    color: #334155;
    margin-bottom: 6px;
  }

  .custom-textarea {
    border-radius: 14px;
    border: 1.5px solid #99f6e4;
    background: #f0fdfa;
    padding: 14px 18px;
    font-size: 1rem;
    transition: all 0.3s ease;
    resize: vertical;
  }

  .custom-textarea:focus {
    border-color: #14b8a6;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.2);
    outline: none;
  }

  .btn-submit {
    background: linear-gradient(90deg, #14b8a6, #10b981);
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.6rem 1.5rem;
    color: #fff;
    box-shadow: 0 6px 20px rgba(16, 185, 129, 0.25);
    transition: all 0.3s ease;
  }

  .btn-submit:hover {
    background: linear-gradient(90deg, #0d9488, #059669);
    box-shadow: 0 10px 28px rgba(16, 185, 129, 0.3);
    transform: translateY(-1px);
  }

  @media (max-width: 576px) {
    .btn-submit {
      width: 100%;
    }
  }
</style>

{% endblock %}
