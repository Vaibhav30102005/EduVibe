{% extends "base.html" %}

{% block content %}
<style>
    body {
        background: radial-gradient(circle at top left, #d1f4ff, #a8e6ff, #89d6fb);
        min-height: 100vh;
        font-family: 'Segoe UI', sans-serif;
    }

    .update-card {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(18px) saturate(150%);
        -webkit-backdrop-filter: blur(18px) saturate(150%);
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 8px 32px rgba(0, 140, 200, 0.25);
        color: #1a3d4f;
        width: 100%;
        max-width: 500px;
        transition: all 0.3s ease-in-out;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .update-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 50px rgba(0, 140, 200, 0.35);
    }

    .update-card h2 {
        text-align: center;
        font-weight: 700;
        color: #0077b6;
        margin-bottom: 25px;
        text-shadow: 0 2px 4px rgba(0, 180, 216, 0.2);
    }

    .form-control {
        background-color: rgba(255, 255, 255, 0.7);
        color: #1a3d4f;
        border: none;
        border-radius: 10px;
        padding: 12px 15px;
        font-size: 1rem;
        transition: 0.3s;
    }

    .form-control:focus {
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(0, 180, 216, 0.2);
        outline: none;
    }

    .form-control::placeholder {
        color: rgba(0, 0, 0, 0.5);
    }

    .btn-custom {
        background: linear-gradient(90deg, #00b4d8, #0077b6);
        border: none;
        border-radius: 30px;
        padding: 12px 25px;
        color: white;
        font-weight: bold;
        transition: 0.3s ease-in-out;
    }

    .btn-custom:hover {
        transform: scale(1.05);
        background: linear-gradient(90deg, #0077b6, #00b4d8);
        box-shadow: 0 4px 20px rgba(0, 180, 216, 0.35);
    }

    .btn-cancel {
        border-radius: 30px;
        padding: 12px 25px;
        background-color: #dee2e6;
        color: black;
        border: none;
        transition: 0.3s;
    }

    .btn-cancel:hover {
        background-color: #ced4da;
        transform: scale(1.02);
    }
</style>

<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="col-md-6 update-card">
        <h2 class="text-center mb-4">✏️ Update Doubt</h2>
        <form method="POST">
            
            {% if current_user.role == 'student' %}
                <!-- Student can update Question -->
                <div class="mb-3">
                    <label class="form-label">Question</label>
                    <input type="text" name="question" class="form-control" value="{{ doubt.question }}" required>
                </div>
            {% elif current_user.role in ['admin', 'cr'] %}
                <!-- Admin/CR can update Answer -->
                <div class="mb-3">
                    <label class="form-label">Answer</label>
                    <textarea name="answer" class="form-control" rows="4" required>{{ doubt.answer }}</textarea>
                </div>
            {% endif %}

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-custom">💾 Save Changes</button>
                <a href="{{ url_for('doubt.view_doubts') }}" class="btn btn-light btn-cancel">❌ Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
